# ============================================================
# Capiva Cloud — ambiente de testes
#   docker compose up -d
# ============================================================
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: capiva
      POSTGRES_PASSWORD: capiva
      POSTGRES_DB: capiva
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capiva"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://capiva:capiva@postgres:5432/capiva?schema=public
      PORT: "3000"
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: capiva
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      COOKIE_SECURE: "false"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
